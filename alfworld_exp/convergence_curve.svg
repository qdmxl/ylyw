<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#212529">YLYW V10 知己+知耻学习 经验持久化收敛曲线</text>
  <text x="350" y="55" text-anchor="middle" font-size="12" fill="#6c757d">ALFWorld valid_unseen 134局 × 5轮</text>

  <!-- Chart area: x=80..620, y=80..330 -->
  <!-- Y axis: 成功率 65%-76% -->
  <!-- X axis: V9, R1, R2, R3, R4, R5 -->

  <!-- Grid -->
  <g stroke="#dee2e6" stroke-width="0.5">
    <line x1="80" y1="80" x2="620" y2="80"/>   <!-- 76% -->
    <line x1="80" y1="103" x2="620" y2="103"/>  <!-- 74% -->
    <line x1="80" y1="126" x2="620" y2="126"/>  <!-- 72% -->
    <line x1="80" y1="148" x2="620" y2="148"/>  <!-- 70% -->
    <line x1="80" y1="171" x2="620" y2="171"/>  <!-- 68% -->
    <line x1="80" y1="194" x2="620" y2="194"/>  <!-- 66% -->
  </g>

  <!-- Y labels -->
  <g font-size="11" fill="#6c757d" text-anchor="end">
    <text x="75" y="84">76%</text>
    <text x="75" y="107">74%</text>
    <text x="75" y="130">72%</text>
    <text x="75" y="152">70%</text>
    <text x="75" y="175">68%</text>
    <text x="75" y="198">66%</text>
  </g>

  <!-- X positions: 120, 210, 300, 390, 480, 570 -->
  <!-- Y = 330 - (rate - 64) * (250/12) -->
  <!-- V9=70.1 → y=330-(6.1*20.83)=330-127=203 -->
  <!-- R1=73.1 → y=330-(9.1*20.83)=330-190=140 -->
  <!-- R2=73.9 → y=330-(9.9*20.83)=330-206=124 -->
  <!-- R3=73.9 → y=124 -->
  <!-- R4=73.9 → y=124 -->
  <!-- R5=73.9 → y=124 -->

  <!-- 成功率线 (蓝) -->
  <polyline points="120,148 210,126 300,117 390,117 480,117 570,117"
            fill="none" stroke="#2563eb" stroke-width="3" stroke-linejoin="round"/>
  <g fill="#2563eb">
    <circle cx="120" cy="148" r="6"/>
    <circle cx="210" cy="126" r="6"/>
    <circle cx="300" cy="117" r="6"/>
    <circle cx="390" cy="117" r="6"/>
    <circle cx="480" cy="117" r="6"/>
    <circle cx="570" cy="117" r="6"/>
  </g>
  <g font-size="12" font-weight="bold" fill="#2563eb" text-anchor="middle">
    <text x="120" y="140">70.1%</text>
    <text x="210" y="118">73.1%</text>
    <text x="300" y="109">73.9%</text>
    <text x="390" y="109">73.9%</text>
    <text x="480" y="109">73.9%</text>
    <text x="570" y="109">73.9%</text>
  </g>

  <!-- 步数线 (右Y轴) - 全局平均步数 -->
  <!-- 范围 19-22, y=80+(step-19)*83.3 -->
  <!-- V9=21.5 → y=80+2.5*83=288 -->
  <!-- R1=20.5 → y=80+1.5*83=205 -->
  <!-- R2=20.1 → y=80+1.1*83=171 -->
  <!-- etc -->
  <!-- 简化: y = 330 - (22-step)*62.5 -->
  <!-- V9=21.5 → y=330-0.5*62.5=299 -->
  <!-- R1=20.5 → y=330-1.5*62.5=236 -->
  <!-- R2=20.1 → y=330-1.9*62.5=211 -->
  <!-- R3=20.1 → 211 -->
  <!-- R4=20.2 → 217 -->
  <!-- R5=20.2 → 217 -->

  <!-- 步数子图 y=230..360 -->
  <text x="350" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">全局平均步数</text>

  <!-- 步数柱状图 -->
  <g fill="#e76f51" opacity="0.85">
    <rect x="105" y="293" width="30" height="47" rx="3"/>  <!-- V9: 21.5 -->
    <rect x="195" y="305" width="30" height="35" rx="3"/>  <!-- R1: 20.5 -->
    <rect x="285" y="310" width="30" height="30" rx="3"/>  <!-- R2: 20.1 -->
    <rect x="375" y="310" width="30" height="30" rx="3"/>  <!-- R3: 20.1 -->
    <rect x="465" y="309" width="30" height="31" rx="3"/>  <!-- R4: 20.2 -->
    <rect x="555" y="309" width="30" height="31" rx="3"/>  <!-- R5: 20.2 -->
  </g>
  <g font-size="11" fill="#c0392b" font-weight="bold" text-anchor="middle">
    <text x="120" y="288">21.5</text>
    <text x="210" y="300">20.5</text>
    <text x="300" y="305">20.1</text>
    <text x="390" y="305">20.1</text>
    <text x="480" y="304">20.2</text>
    <text x="570" y="304">20.2</text>
  </g>

  <!-- X labels -->
  <g font-size="12" fill="#212529" text-anchor="middle">
    <text x="120" y="355">V9</text>
    <text x="210" y="355">R1</text>
    <text x="300" y="355">R2</text>
    <text x="390" y="355">R3</text>
    <text x="480" y="355">R4</text>
    <text x="570" y="355">R5</text>
  </g>
  <g font-size="10" fill="#6c757d" text-anchor="middle">
    <text x="120" y="368">基线</text>
    <text x="210" y="368">零经验</text>
    <text x="300" y="368">+1轮</text>
    <text x="390" y="368">+2轮</text>
    <text x="480" y="368">+3轮</text>
    <text x="570" y="368">+4轮</text>
  </g>

  <!-- 校准次数 -->
  <g font-size="10" fill="#6c757d" text-anchor="middle">
    <text x="120" y="382">cal=18</text>
    <text x="210" y="382">cal=15</text>
    <text x="300" y="382">cal=38</text>
    <text x="390" y="382">cal=61</text>
    <text x="480" y="382">cal=84</text>
    <text x="570" y="382">cal=107</text>
  </g>

  <!-- 收敛标注 -->
  <line x1="280" y1="117" x2="590" y2="117" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <rect x="395" y="85" width="110" height="22" fill="#2563eb" rx="4" opacity="0.1"/>
  <text x="450" y="100" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">← 收敛于73.9%</text>

  <!-- Legend -->
  <g transform="translate(80, 400)">
    <circle cx="10" cy="0" r="5" fill="#2563eb"/>
    <text x="20" y="4" font-size="11" fill="#212529">成功率</text>
    <rect x="90" y="-6" width="14" height="12" fill="#e76f51" rx="2" opacity="0.85"/>
    <text x="110" y="4" font-size="11" fill="#212529">平均步数</text>
  </g>
</svg>